        pagination: { $ref: "#/components/schemas/Pagination" }
        request_id: { $ref: "#/components/schemas/RequestIDValue" }
    IntakeMutationEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [snapshot]
          properties:
            snapshot: { $ref: "#/components/schemas/AuthorizedAppSnapshot" }
            cleanup:
              type: object
              additionalProperties: false
              required: [status, total, deleted, missing, pending]
              properties:
                status: { type: string, enum: [complete, not_required, recovery_required] }
                total: { type: integer, format: int64, minimum: 0 }
                deleted: { type: integer, format: int64, minimum: 0 }
                missing: { type: integer, format: int64, minimum: 0 }
                pending: { type: integer, format: int64, minimum: 0 }
                code: { type: string, maxLength: 128 }
        request_id: { $ref: "#/components/schemas/RequestIDValue" }
    PlanLinksEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/PlanLink" } }
        request_id: { $ref: "#/components/schemas/RequestIDValue" }
    AttachmentUploadEnvelope:
      type: object
