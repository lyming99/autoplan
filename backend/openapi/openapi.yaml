      responses: { "201": { $ref: "#/components/responses/AttachmentUpload" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "413": { $ref: "#/components/responses/ErrorResponse" }, "415": { $ref: "#/components/responses/ErrorResponse" }, "422": { $ref: "#/components/responses/ErrorResponse" }, "423": { $ref: "#/components/responses/Locked" } }
  /api/v1/attachments/{attachment_id}/content:
    parameters: [{ $ref: "#/components/parameters/AttachmentID" }]
    get:
      tags: [attachments]
      operationId: downloadAttachment
      summary: Authorized attachment download
      description: project_id is mandatory and must match the attachment's project; Range supports one bytes range.
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }, { $ref: "#/components/parameters/AttachmentProjectID" }, { name: Range, in: header, required: false, schema: { type: string, pattern: "^bytes=.*$" } }]
      responses:
        "200": { description: Attachment bytes, headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" }, Content-Disposition: { schema: { type: string } } }, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        "206": { description: Partial attachment bytes, headers: { Content-Range: { schema: { type: string } } }, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "416": { $ref: "#/components/responses/ErrorResponse" }
