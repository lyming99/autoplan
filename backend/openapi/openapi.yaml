        request_id:
          $ref: "#/components/schemas/RequestIDValue"
    ProjectListEnvelope:
      type: object
      additionalProperties: false
      required: [data, pagination, request_id]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuthorizedProject"
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          $ref: "#/components/schemas/RequestIDValue"
    IntakeEnvelope:
