  /api/v1/plans:
    delete:
      tags: [plans]
      operationId: deletePlan
      summary: Delete one idle plan and return the committed project snapshot
      description: |
        Implements the enabled plans.delete capability. The request body is the
        same versioned mutation payload sent by HttpAutoplanClient. Deletion is
        rejected when the target is missing, the supplied updated_at is stale,
        or protected running relations exist. A successful response contains a
        freshly assembled snapshot that no longer includes the deleted plan.
        Query parameters are not accepted.
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanDeleteRequest"
      responses:
        "200":
          description: Plan deleted and the committed snapshot reread.
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestID" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlanMutationEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "405": { $ref: "#/components/responses/MethodNotAllowed" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/ErrorResponse" }
        "413": { $ref: "#/components/responses/ErrorResponse" }
        "415": { $ref: "#/components/responses/ErrorResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
        "423": { $ref: "#/components/responses/Locked" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
        "504": { $ref: "#/components/responses/RequestTimeout" }
