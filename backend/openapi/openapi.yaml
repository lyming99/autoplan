  /api/v1/runtime/commands:
    post:
      tags: [runtime]
      operationId: executeRuntimeCommand
      summary: Execute one versioned Loop, Plan, Task, Chat, automation, or runtime configuration command
      description: |
        The command DTO is closed and uses snake_case. It never accepts SQL,
        table identifiers, process arguments, or an environment map. Typed
        terminal settings are write-only intent and require runtime policy.
        The same application bridge is used by REST, MCP,
        UI, and the Node compatibility client. A success requires a real
        operation reference; unavailable dispatchers fail without local replay.
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/ActionIdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeCommand"
      responses:
        "202":
          description: Command accepted by the Go runtime owner.
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestID" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCommandEnvelope"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/ErrorResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
        "504": { $ref: "#/components/responses/RequestTimeout" }
