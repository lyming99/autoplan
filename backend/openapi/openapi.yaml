      operationId: headAttachment
      summary: Validate attachment download and return headers only
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }, { $ref: "#/components/parameters/AttachmentProjectID" }]
