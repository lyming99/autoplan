openapi: 3.1.0
info:
  title: AutoPlan Loopback Sidecar API
  version: 0.6.0-runtime-actions
  description: |
    Versioned contract for the loopback-only Go sidecar. Project, LoopConfig,
    Intake, attachment, and Plan persistence operations use shared application
    services, caller-scoped idempotency, project ownership checks, and safe
    public DTOs. Runtime operations use one typed bridge shared by REST, MCP,
    UI and the Node compatibility client. Versioned resource action routes
    return an Operation reference and never expose process, workspace,
    session, environment, or secret data; arbitrary SQL and table endpoints
    are not part of this API.
servers:
  - url: http://127.0.0.1:{port}
    description: Process-local loopback listener
    variables:
      port:
        default: "0"
        description: Runtime-selected port; 0 is configuration notation only.
tags:
  - name: probes
  - name: projects
  - name: config
  - name: intake
  - name: attachments
  - name: capabilities
  - name: plans
  - name: tasks
  - name: automation
  - name: scripts
  - name: executors
  - name: chat
  - name: mcp
  - name: terminal
  - name: runtime
  - name: operations
  - name: events
  - name: skeleton
paths:
  /healthz:
    get:
      tags: [probes]
      operationId: getHealth
      summary: Process liveness
      description: Does not imply dependency readiness and never returns configuration or credentials.
      responses:
        "200":
          description: Process is alive.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResponse"
  /readyz:
    get:
      tags: [probes]
      operationId: getReadiness
      summary: Dependency and lifecycle readiness
      responses:
        "200":
          description: The configured bootstrap gates are ready.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/projects:
    get:
      tags: [projects]
      operationId: listProjects
      summary: List projects in deterministic update order
      description: |
        Returns projects ordered by updated_at descending with the application
        service's stable ID tie-break. Repeated, empty, malformed, or unknown
        query parameters are rejected. Pages beyond the result set return an
        empty data array with the same total and a null next_page. Responses
        are Cache-Control: no-store and do not emit validators, so conditional
        request headers never produce a 304 response.
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/ProjectSort"
        - $ref: "#/components/parameters/ProjectFilter"
      responses:
        "200":
          description: A deterministic page of projects.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/RequestTimeout"
    post:
      tags: [projects]
      operationId: createProject
      summary: Create a project and return its committed compatibility snapshot
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project committed and reread from the repository.
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestID" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotEnvelope"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "423": { $ref: "#/components/responses/Locked" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
        "504": { $ref: "#/components/responses/RequestTimeout" }
    head:
      tags: [projects]
      operationId: headProjects
      summary: Validate access to the project list representation
      description: Runs the same validation, authorization, and service read as GET but returns no response body.
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/ProjectSort"
        - $ref: "#/components/parameters/ProjectFilter"
      responses:
        "200":
          description: The project page is available; representation body omitted.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/RequestTimeout"
  /api/v1/projects/{project_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectID"
    get:
      tags: [projects]
      operationId: getProject
      summary: Get one project
      description: Returns the shared application Project DTO. The authorized local workspace_path is never available before session, Origin, and Host validation.
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
      responses:
        "200":
          description: The requested project.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/RequestTimeout"
    head:
      tags: [projects]
      operationId: headProject
      summary: Validate access to one project representation
      description: Runs the same validation, authorization, and service read as GET but returns no response body and never emits a validator.
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
      responses:
        "200":
          description: The project exists; representation body omitted.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/RequestTimeout"
    patch:
      tags: [projects]
      operationId: updateProject
      summary: Update project metadata and return the committed snapshot
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project update committed and reread.
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestID" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SnapshotEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "423": { $ref: "#/components/responses/Locked" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
        "504": { $ref: "#/components/responses/RequestTimeout" }
    delete:
      tags: [projects]
      operationId: deleteProject
      summary: Delete a stopped project according to the frozen relation policy
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Project deleted; data is the committed project-list snapshot.
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestID" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SnapshotEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "423": { $ref: "#/components/responses/Locked" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
        "504": { $ref: "#/components/responses/RequestTimeout" }
  /api/v1/projects/{project_id}/loop-config:
    parameters:
      - $ref: "#/components/parameters/ProjectID"
    get:
      tags: [config]
      operationId: getLoopConfig
      summary: Get the sanitized committed project configuration snapshot
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
      responses:
        "200":
          description: Sanitized configuration snapshot; raw tokens and env values are absent.
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestID" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SnapshotEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
        "504": { $ref: "#/components/responses/RequestTimeout" }
    head:
      tags: [config]
      operationId: headLoopConfig
      summary: Validate access to the sanitized configuration representation
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
      responses:
        "200": { description: Configuration exists; representation body omitted. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
        "504": { $ref: "#/components/responses/RequestTimeout" }
    patch:
      tags: [config]
      operationId: configureLoop
      summary: Replace the versioned LoopConfig target and return the committed snapshot
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoopConfigRequest" }
      responses:
        "200":
          description: Versioned configuration committed and reread.
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestID" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SnapshotEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "423": { $ref: "#/components/responses/Locked" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
        "504": { $ref: "#/components/responses/RequestTimeout" }
    delete:
      tags: [config]
      operationId: resetLoopConfig
      summary: Reset LoopConfig defaults using optimistic version control
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetConfigRequest" }
      responses:
        "200":
          description: Defaults committed and reread.
          headers:
            X-Request-ID: { $ref: "#/components/headers/RequestID" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SnapshotEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "423": { $ref: "#/components/responses/Locked" }
        "428": { $ref: "#/components/responses/PreconditionRequired" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
        "504": { $ref: "#/components/responses/RequestTimeout" }
  /api/v1/projects/{project_id}/snapshot:
    parameters:
      - $ref: "#/components/parameters/ProjectID"
    get:
      tags: [projects]
      operationId: getProjectSnapshot
      summary: Get the complete compatibility snapshot for one project
      description: |
        Controlled HTTP mapping of the P00 historical snapshot IPC target. The
        shared application service preserves the complete AppSnapshot shape and
        rejects a missing explicit project instead of substituting an empty
        snapshot. Responses are no-store and do not return 304.
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
      responses:
        "200":
          description: Complete compatibility snapshot.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/RequestTimeout"
    head:
      tags: [projects]
      operationId: headProjectSnapshot
      summary: Validate access to one compatibility snapshot
      description: Runs the same validation, authorization, and service read as GET but returns no response body.
      security:
        - SessionHeader: []
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/Origin"
      responses:
        "200":
          description: The snapshot is available; representation body omitted.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestID"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/RequestTimeout"
  /api/v1/projects/{project_id}/requirements:
    parameters: [{ $ref: "#/components/parameters/ProjectID" }]
    get:
      tags: [intake]
      operationId: listRequirements
      summary: List project requirements
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }, { $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }, { $ref: "#/components/parameters/IntakeStatus" }]
      responses:
        "200": { $ref: "#/components/responses/IntakeList" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
    post:
      tags: [intake]
      operationId: createRequirement
      summary: Create a requirement
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }, { $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateIntakeRequest" } } } }
      responses:
        "201": { $ref: "#/components/responses/IntakeMutation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /api/v1/projects/{project_id}/requirements/{intake_id}:
    parameters: [{ $ref: "#/components/parameters/ProjectID" }, { $ref: "#/components/parameters/IntakeID" }]
    get:
      tags: [intake]
      operationId: getRequirement
      summary: Get one requirement
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }]
      responses:
        "200": { $ref: "#/components/responses/Intake" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [intake]
      operationId: updateRequirement
      summary: Patch one requirement under optional timestamp precondition
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }, { $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UpdateIntakeRequest" } } } }
      responses:
        "200": { $ref: "#/components/responses/IntakeMutation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/ErrorResponse" }
        "422": { $ref: "#/components/responses/ErrorResponse" }
    delete:
      tags: [intake]
      operationId: deleteRequirement
      summary: Delete a requirement and schedule associated attachment cleanup
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }, { $ref: "#/components/parameters/IdempotencyKey" }]
      responses:
        "200": { $ref: "#/components/responses/IntakeMutation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "423": { $ref: "#/components/responses/Locked" }
  /api/v1/projects/{project_id}/requirements/{intake_id}/accept:
    parameters: [{ $ref: "#/components/parameters/ProjectID" }, { $ref: "#/components/parameters/IntakeID" }]
    post:
      tags: [intake]
      operationId: acceptRequirement
      summary: Mark a requirement accepted
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }, { $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "200": { $ref: "#/components/responses/IntakeMutation" }, "401": { $ref: "#/components/responses/Unauthorized" }, "404": { $ref: "#/components/responses/NotFound" } }
    delete:
      tags: [intake]
      operationId: unacceptRequirement
      summary: Clear requirement acceptance
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }, { $ref: "#/components/parameters/IdempotencyKey" }]
      responses: { "200": { $ref: "#/components/responses/IntakeMutation" }, "401": { $ref: "#/components/responses/Unauthorized" }, "404": { $ref: "#/components/responses/NotFound" } }
  /api/v1/projects/{project_id}/requirements/{intake_id}/plan-links:
    parameters: [{ $ref: "#/components/parameters/ProjectID" }, { $ref: "#/components/parameters/IntakeID" }]
    get:
      tags: [intake]
      operationId: listRequirementPlanLinks
      summary: List frozen plan links for a requirement
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }]
      responses: { "200": { $ref: "#/components/responses/PlanLinks" }, "401": { $ref: "#/components/responses/Unauthorized" }, "404": { $ref: "#/components/responses/NotFound" } }
    put:
      tags: [intake]
      operationId: replaceRequirementPlanLinks
      summary: Atomically replace requirement plan links
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }, { $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ReplacePlanLinksRequest" } } } }
      responses: { "200": { $ref: "#/components/responses/IntakeMutation" }, "401": { $ref: "#/components/responses/Unauthorized" }, "404": { $ref: "#/components/responses/NotFound" }, "409": { $ref: "#/components/responses/Conflict" }, "422": { $ref: "#/components/responses/ErrorResponse" } }
  /api/v1/projects/{project_id}/requirements/{intake_id}/attachments:
    parameters: [{ $ref: "#/components/parameters/ProjectID" }, { $ref: "#/components/parameters/IntakeID" }]
    post:
      tags: [attachments]
      operationId: uploadRequirementAttachment
      summary: Upload one verified requirement attachment
      description: Exactly one multipart file field named file is accepted. Storage paths, hashes, and recovery records are server-controlled.
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }, { $ref: "#/components/parameters/IdempotencyKey" }]
      requestBody: { required: true, content: { multipart/form-data: { schema: { type: object, additionalProperties: false, required: [file], properties: { file: { type: string, format: binary } } } } } }
      responses: { "201": { $ref: "#/components/responses/AttachmentUpload" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "413": { $ref: "#/components/responses/ErrorResponse" }, "415": { $ref: "#/components/responses/ErrorResponse" }, "422": { $ref: "#/components/responses/ErrorResponse" }, "423": { $ref: "#/components/responses/Locked" } }
  /api/v1/projects/{project_id}/feedback:
    parameters: [{ $ref: "#/components/parameters/ProjectID" }]
    get:
      tags: [intake]
      operationId: listFeedback
      summary: List project feedback
      security: [{ SessionHeader: [] }, { SessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/Origin" }, { $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }, { $ref: "#/components/parameters/IntakeStatus" }]
