        request_id: { $ref: "#/components/schemas/RequestIDValue" }
    AttachmentDeleteEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: { $ref: "./schemas/attachment.schema.json#/$defs/delete_result" }
        request_id: { $ref: "#/components/schemas/RequestIDValue" }
    Pagination:
      type: object
      additionalProperties: false
      required: [page, page_size, total, next_page]
      properties:
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 200
        total:
          type: integer
          minimum: 0
        next_page:
          oneOf:
            - type: integer
              minimum: 2
            - type: "null"
    RequestIDValue:
      type: string
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{0,63}$"
    Error:
      $ref: "./schemas/error.schema.json"
      description: >-
        Stable codes include invalid_json, body_too_large, unsupported_media_type,
        invalid_idempotency_key, invalid_pagination, invalid_project_id,
        invalid_project, invalid_config, invalid_intake, invalid_attachment,
        invalid_automation, invalid_conversation, invalid_cursor,
        project_not_found, intake_not_found, attachment_not_found, automation_not_found,
        conversation_not_found, config_not_found,
        version_required, version_conflict, precondition_failed, project_running,
        relation_conflict, duplicate_intake, attachment_recovery_required,
        range_not_satisfiable, insufficient_storage, idempotency_key_reused, request_in_progress, repository_busy,
        repository_schema_drift, repository_unavailable, request_timeout, invalid_runtime_command,
        unauthorized, origin_forbidden, method_not_allowed, invalid_operation,
        operation_not_found, operation_version_conflict, operation_state_conflict,
        not_implemented, service_unavailable, shutting_down, and internal_error. The not_implemented detail capability is an opaque
        advertised action name and never identifies a resource or command.
    OperationAccepted:
      $ref: "./schemas/operation.schema.json#/$defs/OperationAccepted"
    Operation:
      $ref: "./schemas/operation.schema.json#/$defs/Operation"
    OperationEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: { $ref: "#/components/schemas/Operation" }
        request_id: { $ref: "#/components/schemas/RequestIDValue" }
    CancelOperationRequest:
      type: object
      additionalProperties: false
      required: [expected_version]
      properties:
        expected_version: { type: integer, format: int64, minimum: 1 }
    Event:
      $ref: "./schemas/event.schema.json#/$defs/EventEnvelope"
    EventEnvelopeV1:
      $ref: "./schemas/event.schema.json#/$defs/EventEnvelope"
    SSEEnvelopeV1:
      $ref: "./schemas/sse-envelope-v1.schema.json"
    WSEnvelopeV1:
      $ref: "./schemas/ws-envelope-v1.schema.json"
    TerminalSession:
      $ref: "./schemas/terminal.schema.json#/$defs/terminal_session"
    TerminalCreateRequest:
      $ref: "./schemas/terminal.schema.json#/$defs/terminal_create_request"
    TerminalWriteRequest:
      $ref: "./schemas/terminal.schema.json#/$defs/terminal_write_request"
    TerminalResizeRequest:
      $ref: "./schemas/terminal.schema.json#/$defs/terminal_resize_request"
    TerminalRenameRequest:
      $ref: "./schemas/terminal.schema.json#/$defs/terminal_rename_request"
    TerminalEmptyRequest:
      $ref: "./schemas/terminal.schema.json#/$defs/terminal_empty_request"
    TerminalReplay:
      $ref: "./schemas/terminal.schema.json#/$defs/terminal_replay"
    TerminalErrorResult:
      $ref: "./schemas/terminal.schema.json#/$defs/terminal_error_result"
    TerminalEnvelope:
      $ref: "./schemas/terminal.schema.json#/$defs/terminal_envelope"
    TerminalWebSocketClient:
      $ref: "./schemas/terminal.schema.json#/$defs/terminal_ws_client"
    TerminalWebSocketServer:
      $ref: "./schemas/terminal.schema.json#/$defs/terminal_ws_server"
    TerminalSessionEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: { $ref: "#/components/schemas/TerminalSession" }
        request_id: { $ref: "#/components/schemas/RequestIDValue" }
    TerminalSessionsEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data:
          type: array
          maxItems: 32
          items: { $ref: "#/components/schemas/TerminalSession" }
        request_id: { $ref: "#/components/schemas/RequestIDValue" }
    TerminalReplayEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: { $ref: "#/components/schemas/TerminalReplay" }
        request_id: { $ref: "#/components/schemas/RequestIDValue" }
    ProbeResponse:
      type: object
      additionalProperties: false
      required: [status, request_id]
      properties:
        status:
          type: string
          enum: [ok, ready]
        request_id:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{0,63}$"
  responses:
    Operation:
      description: Safe Operation DTO with no raw runner output.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/OperationEnvelope" } } }
    EventStream:
      description: Authenticated SSE stream. The initial retry directive is 3000 milliseconds and heartbeat is emitted every 15 seconds. Each data line is the frozen EventEnvelopeV1; persistent entries use SSE id equal to event_id, while heartbeat and resync_required omit it.
      headers:
        X-Request-ID: { $ref: "#/components/headers/RequestID" }
        Cache-Control: { schema: { type: string, const: no-store } }
      content:
        text/event-stream:
          schema: { $ref: "#/components/schemas/EventEnvelopeV1" }
    AutomationScript:
      description: Safe static script metadata.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/AutomationScriptEnvelope" } } }
    AutomationScripts:
      description: Project-scoped safe script metadata.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/AutomationScriptsEnvelope" } } }
    AutomationExecutor:
      description: Safe static executor metadata.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/AutomationExecutorEnvelope" } } }
    AutomationExecutors:
      description: Project-scoped safe executor metadata.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/AutomationExecutorsEnvelope" } } }
    ScriptRunAccepted:
      description: Script run admitted by the shared application service. Follow operation_id through Operation and SSE; no command, source, environment or output stream is returned.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ScriptRunAcceptedEnvelope" } } }
    ScriptStopAccepted:
      description: Script stop applied only to a current Go-owned operation, or reports stopped=false without adopting a process.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ScriptStopEnvelope" } } }
    ExecutorRunAccepted:
      description: Executor run or plugin action admitted by the shared application service. Output remains available only as bounded redacted operation/resource metadata.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ExecutorRunAcceptedEnvelope" } } }
    ExecutorStopAccepted:
      description: Executor stop applied only to a current Go-owned operation, or reports stopped=false without process adoption.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ExecutorStopEnvelope" } } }
    Conversation:
      description: Safe conversation metadata.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ConversationEnvelope" } } }
    ConversationPage:
      description: Cursor page of safe conversations.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ConversationPageEnvelope" } } }
    MessagePage:
      description: Cursor page of message metadata without bodies or tool data.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/MessagePageEnvelope" } } }
    ChatMessagePage:
      description: Cursor page of frozen full ChatMessage history for one authorized conversation.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ChatMessagePageEnvelope" } } }
    ChatQueue:
      description: Authoritative complete FIFO queue snapshot for one authorized conversation.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ChatQueueEnvelope" } } }
    ChatSendAccepted:
      description: Chat turn was durably admitted. Follow its turn_id and optional operation_id through the chat SSE stream; transport loss must not replay the request.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ChatSendAcceptedEnvelope" } } }
    ChatBooleanResult:
      description: Frozen legacy-compatible queue mutation result.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ChatBooleanResultEnvelope" } } }
    ChatStop:
      description: Chat stop result. It can request cancellation only from the runtime that owns the accepted turn.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ChatStopEnvelope" } } }
    ChatClear:
      description: Frozen clear-history result. It does not transfer ownership of a running turn.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ChatClearEnvelope" } } }
    ChatEventStream:
      description: Authenticated P13A SSE stream. Durable chat_chunk, chat_queue and chat_done records use SSE id equal to event_id. Every turn has monotonically sequenced chunks followed by exactly one chat_done; control heartbeat/resync_required entries omit a durable id.
      headers:
        X-Request-ID: { $ref: "#/components/headers/RequestID" }
        Cache-Control: { schema: { type: string, const: no-store } }
      content:
        text/event-stream:
          schema: { $ref: "#/components/schemas/ChatEventEnvelope" }
    AIConfig:
      description: Masked AI configuration metadata.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/AIConfigEnvelope" } } }
    AIConfigs:
      description: Masked AI configuration list.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/AIConfigsEnvelope" } } }
    ClaudeConfigs:
      description: Masked Claude CLI configuration list.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ClaudeConfigsEnvelope" } } }
    ClaudeConfig:
      description: Masked Claude CLI configuration metadata.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ClaudeConfigEnvelope" } } }
    MCPConfig:
      description: Static MCP configuration; no listener is started.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/MCPConfigEnvelope" } } }
    MCPStatus:
      description: Sanitized MCP status and current immutable catalog projection.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/MCPStatusEnvelope" } } }
    MCPToolCatalog:
      description: Frozen MCP tool documentation catalog. Listing it has no transport or mutation side effect.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/MCPToolCatalogEnvelope" } } }
    TerminalSession:
      description: Frozen TerminalSession metadata for one authorized Go-owned session. It contains no raw terminal stream or environment values.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/TerminalSessionEnvelope" } } }
    TerminalSessions:
      description: Project-scoped list of frozen TerminalSession metadata. The resource lookup does not reveal sessions outside the authorized project.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/TerminalSessionsEnvelope" } } }
    TerminalReplay:
      description: Bounded memory-only terminal replay. A gap is an explicit error, never synthesized output.
      headers: { X-Request-ID: { $ref: "#/components/headers/RequestID" } }
      content: { application/json: { schema: { $ref: "#/components/schemas/TerminalReplayEnvelope" } } }
    TerminalWebSocket:
      description: Successful P14 WebSocket upgrade. Client frames conform to TerminalWebSocketClient and server frames conform to TerminalWebSocketServer; no terminal frame enters project SSE.
      headers:
        X-Request-ID: { $ref: "#/components/headers/RequestID" }
        Cache-Control: { schema: { type: string, const: no-store } }
    ErrorResponse:
      description: Stable error envelope.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      $ref: "#/components/responses/ErrorResponse"
    Unauthorized:
      $ref: "#/components/responses/ErrorResponse"
    Forbidden:
      $ref: "#/components/responses/ErrorResponse"
    NotFound:
      $ref: "#/components/responses/ErrorResponse"
    MethodNotAllowed:
      description: The method is not registered for the matched route.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
        Allow:
          description: Deterministically sorted methods accepted by the matched route.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      $ref: "#/components/responses/ErrorResponse"
    NotImplemented:
      $ref: "#/components/responses/ErrorResponse"
    ServiceUnavailable:
      $ref: "#/components/responses/ErrorResponse"
    RequestTimeout:
      $ref: "#/components/responses/ErrorResponse"
    Conflict:
      $ref: "#/components/responses/ErrorResponse"
    Locked:
      $ref: "#/components/responses/ErrorResponse"
    PreconditionRequired:
      $ref: "#/components/responses/ErrorResponse"
    Intake:
      description: Safe requirement or feedback representation.
      headers:
        X-Request-ID: { $ref: "#/components/headers/RequestID" }
      content:
        application/json: { schema: { $ref: "#/components/schemas/IntakeEnvelope" } }
    IntakeList:
      description: Intake page.
      headers:
        X-Request-ID: { $ref: "#/components/headers/RequestID" }
      content:
        application/json: { schema: { $ref: "#/components/schemas/IntakeListEnvelope" } }
    IntakeMutation:
