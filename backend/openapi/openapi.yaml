                $ref: "#/components/schemas/AuthorizedProject"
            state:
              $ref: "./schemas/snapshot.schema.json#/$defs/safe_object"
    ProjectEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data:
          $ref: "#/components/schemas/AuthorizedProject"
        request_id:
          $ref: "#/components/schemas/RequestIDValue"
    AutomationScriptEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: { $ref: "#/components/schemas/AutomationScript" }
        request_id: { $ref: "#/components/schemas/RequestIDValue" }
    AutomationExecutorEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: { $ref: "#/components/schemas/AutomationExecutor" }
        request_id: { $ref: "#/components/schemas/RequestIDValue" }
    AutomationScriptsEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
