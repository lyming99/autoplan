components:
  securitySchemes:
    SessionHeader:
      type: apiKey
      in: header
      name: X-Autoplan-Session
      description: Ephemeral process-local credential; never place it in URLs, logs, fixtures, or persistent storage.
    SessionCookie:
      type: apiKey
      in: cookie
      name: autoplan_session
      description: Host-only HttpOnly SameSite=Strict alternative to the session header.
  parameters:
    Origin:
      name: Origin
      in: header
      required: true
      description: Exact configured loopback renderer origin; wildcard and missing origins are rejected.
      schema:
        type: string
        format: uri
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Caller-selected replay identity. Retries of one user intent reuse the same key; keys never belong in URLs or logs.
      schema:
        type: string
        pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$"
    ActionIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Stable user-intent identity. Retries reuse it, while an already accepted Operation is observed through its operation_id rather than submitted again. It is never put in a URL or log.
      schema:
        $ref: "./schemas/action.schema.json#/$defs/idempotency_key"
    ProjectID:
      name: project_id
      in: path
      required: true
      description: Canonical base-10 positive 64-bit project identifier; signs and leading zeroes are rejected.
      schema:
        type: integer
        format: int64
        minimum: 1
    RuntimePlanID:
      name: plan_id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    RuntimeTaskID:
      name: task_id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    RuntimeIntakeType:
      name: intake_type
      in: path
      required: true
      schema: { type: string, enum: [requirement, feedback] }
    OperationID:
      name: operation_id
      in: path
      required: true
      description: Opaque Operation identifier. It never authorizes a request without the mandatory project_id scope.
      schema:
        type: string
        pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$"
    TerminalID:
      name: id
      in: path
      required: true
      description: Opaque string terminal session identifier. It is not an authorization grant and is never interchangeable across runtimes.
      schema:
        type: string
        pattern: "^term_[a-z0-9][a-z0-9_-]{5,}$"
        maxLength: 160
    TerminalProjectID:
      name: project_id
      in: query
      required: true
      description: Canonical project scope required for a session action. It does not authorize access by itself; the shared Terminal service verifies it against the authenticated caller and session owner before revealing state.
      schema: { type: integer, format: int64, minimum: 1 }
    TerminalLastSeq:
      name: last_seq
      in: query
      required: false
      description: Last strictly applied output sequence for this authorized session. Omit or use 0 for replay from the current retained watermark; an expired cursor receives a stable replay gap error.
      schema:
        type: integer
        minimum: 0
        maximum: 9007199254740991
    OperationProjectID:
      name: project_id
      in: query
      required: true
      description: Canonical project ownership scope required for Operation REST and Operation SSE routes.
      schema:
        type: integer
        format: int64
        minimum: 1
    SSEAccept:
      name: Accept
      in: header
      required: true
      schema:
        type: string
        description: Must include text/event-stream.
    LastEventID:
      name: Last-Event-ID
      in: header
      required: false
      description: Opaque decimal cursor from a previous event in the same authorized stream. Invalid, future, expired, or unprovable cursors receive resync_required.
      schema:
        type: string
        maxLength: 19
    IntakeID:
      name: intake_id
      in: path
      required: true
      description: Canonical base-10 positive 64-bit requirement or feedback identifier.
      schema:
        type: integer
        format: int64
        minimum: 1
    AttachmentID:
      name: attachment_id
      in: path
      required: true
      description: Canonical base-10 positive 64-bit attachment identifier.
      schema:
        type: integer
        format: int64
        minimum: 1
    ScriptID:
      name: script_id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    ExecutorID:
      name: executor_id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    ExecutorPluginAction:
      name: action
      in: path
      required: true
      description: Persisted plugin lifecycle action. The generic stop route is the only stop admission path.
      schema: { type: string, enum: [start, reload] }
    ConversationID:
      name: conversation_id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    AutomationLimit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    AutomationOffset:
      name: offset
      in: query
      required: false
      schema: { type: integer, minimum: 0, default: 0 }
    ConversationCursor:
      name: cursor
      in: query
      required: false
      schema: { type: string, minLength: 1, maxLength: 512 }
    Version:
      name: version
      in: query
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    AttachmentProjectID:
      name: project_id
      in: query
      required: true
      description: Mandatory ownership scope for direct attachment content and deletion routes.
      schema:
        type: integer
        format: int64
        minimum: 1
    Page:
      name: page
      in: query
      required: false
      description: One-based page number. Omitted independently defaults to 1; repeated or non-canonical values are rejected.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      description: Page capacity. Omitted independently defaults to 50; repeated values are rejected.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    ProjectSort:
      name: sort
      in: query
      required: false
      description: Whitelisted ordering. Every order uses project id in the same direction as a deterministic tie-breaker.
      schema:
        type: string
        enum: [updated_at_desc, updated_at_asc, name_asc, name_desc, id_asc, id_desc]
        default: updated_at_desc
    ProjectFilter:
      name: filter
      in: query
      required: false
      description: Case-insensitive project-name substring, applied before sorting and pagination.
      schema:
        type: string
        minLength: 1
        maxLength: 200
    IntakeStatus:
      name: status
      in: query
      required: false
      description: Exact Intake lifecycle state filter.
      schema:
        type: string
        enum: [draft, open, completed, closed]
  headers:
    RequestID:
      description: Correlation identifier for this request.
      schema:
        type: string
        pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{0,63}$"
  schemas:
    Project:
      $ref: "./schemas/project.schema.json"
    CreateProjectRequest:
      $ref: "./schemas/project.schema.json#/$defs/create_request"
    UpdateProjectRequest:
      $ref: "./schemas/project.schema.json#/$defs/update_request"
    PlanDeleteRequest:
      type: object
      additionalProperties: false
      required: [project_id, plan_id, expected_updated_at]
      properties:
        project_id: { type: integer, format: int64, minimum: 1 }
        plan_id: { type: integer, format: int64, minimum: 1 }
        expected_updated_at:
          type: string
          format: date-time
          pattern: "Z$"
    LoopConfigRequest:
      $ref: "./schemas/config.schema.json#/$defs/loop_config_request"
    ResetConfigRequest:
      $ref: "./schemas/config.schema.json#/$defs/reset_request"
    Intake:
      $ref: "./schemas/intake.schema.json"
    CreateIntakeRequest:
      $ref: "./schemas/intake.schema.json#/$defs/create_request"
    UpdateIntakeRequest:
      $ref: "./schemas/intake.schema.json#/$defs/update_request"
    ReplacePlanLinksRequest:
      $ref: "./schemas/intake.schema.json#/$defs/replace_links_request"
    PlanLink:
      $ref: "./schemas/intake.schema.json#/$defs/plan_link"
    Attachment:
      $ref: "./schemas/attachment.schema.json"
    CapabilityResponse:
      $ref: "./schemas/capability.schema.json"
    AutomationScript:
      $ref: "./schemas/automation.schema.json#/$defs/script"
    AutomationExecutor:
      $ref: "./schemas/automation.schema.json#/$defs/executor"
    ScriptRunAccepted:
      $ref: "./schemas/script-run.schema.json#/$defs/operation_accepted"
    ScriptStopResult:
      $ref: "./schemas/script-run.schema.json#/$defs/stop_result"
    ExecutorRunAccepted:
      $ref: "./schemas/executor-run.schema.json#/$defs/operation_accepted"
    ExecutorStopResult:
      $ref: "./schemas/executor-run.schema.json#/$defs/stop_result"
    Conversation:
      $ref: "./schemas/chat.schema.json#/$defs/conversation"
    ChatMessageMetadata:
      $ref: "./schemas/chat.schema.json#/$defs/message_metadata"
    ChatMessage:
      $ref: "./schemas/chat.schema.json#/$defs/chat_message"
    LegacyChatMessage:
      $ref: "./schemas/chat.schema.json#/$defs/legacy_chat_message"
    ChatQueue:
      $ref: "./schemas/chat.schema.json#/$defs/chat_queue"
    LegacyChatQueue:
